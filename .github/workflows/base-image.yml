name: Base Devcontainer Image

on:
  push:
    branches:
      - main
    paths:
      - .devcontainer/Dockerfile.base
      - .github/workflows/base-image.yml
  workflow_dispatch:
  schedule:
    - cron: "0 6 1 * *"

permissions:
  contents: read
  packages: write

jobs:
  build-base-image:
    name: Build and Publish Base Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate base image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-base
          tags: |
            type=raw,value=main
            type=sha

      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile.base
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=base-image
          cache-to: type=gha,mode=max,scope=base-image
